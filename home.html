<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
     <!-- title and logo  -->
    <title>GitHub Issues Tracker</title>
    <link rel="shortcut icon" href="./assets/logo.png" type="image/x-icon" />

    <!-- font awesome  -->
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.0/css/all.min.css"
      integrity="sha512-DxV+EoADOkOygM4IR9yXP8Sb2qwgidEmeqAEmDKIOfPRQZOWbXCzLC6vjbZyy0vPisbH2SyW27+ddLVCN+OMzQ=="
      crossorigin="anonymous"
      referrerpolicy="no-referrer"
    />

    <!-- font integration  -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&display=swap" rel="stylesheet">

    <!-- tailwind+daisyui  -->
    <link
      href="https://cdn.jsdelivr.net/npm/daisyui@5"
      rel="stylesheet"
      type="text/css"
    />

    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

    <!-- stylesheet  -->
    <link rel="stylesheet" href="style/style.css" />

    <style>
      .section{
         display:none;
      }

      .section.active{
        display:grid;
      }

      .active-btn{
        background-color: #4A00FF;
        color: wheat;
      }
    </style>
</head>
<body>
    

    <header>
         <div class="navbar bg-base-100 shadow-sm justify-between mb-14">
  <div class="flex items-center pl-4">
    <img class="w-11 h-11 mr-3" src="./assets/github-logo.png" alt="">
    <a href="" class=" font-bold text-wrap md:text-xl">GitHub Issues Tracker</a>
  </div>
  <div class="flex gap-2 pr-4">
    <input id="input-search" type="text" placeholder= "Search issues..." class="input input-bordered pr-10 md:pr-24 w-24 md:w-auto" />
    <div class="dropdown dropdown-end">
      <button id="btn-search" class="btn btn-primary text-nowrap"><i class="fa-solid fa-magnifying-glass"></i> Search</button>
      <button class="btn btn-primary text-nowrap"><i class="fa-solid fa-plus"></i> New Issue</button>
    </div>
  </div>
</div>
    </header>

    <section id="spinner" class="flex justify-center items-center py-15 bg-[#F8F8F8] w-11/12 mx-auto rounded-[24px] hidden">
      <span class="loading loading-dots loading-xl"></span>
        </section>

    <main id="main-container">
        <section>
            <div class="mb-6 space-x-2 w-10/12 mx-auto p-10 shadow-md border-2 border-gray-50 mt-16">
              <button id="all-btn" onclick="showSection('all', this)" class="active-btn filter-btn btn btn-soft text-gray-500 bg-white border border-neutral-content hover:bg-primary hover:text-white px-10 rounded-md">All</button>
              <button id="open-btn" onclick="showSection('open', this)" class="btn btn-soft text-gray-500 bg-white border border-neutral-content hover:bg-primary hover:text-white px-10 rounded-md filter-btn">Open</button>
              <button id="close-btn" onclick="showSection('close', this)" class="btn btn-soft text-gray-500 bg-white border border-neutral-content hover:bg-primary hover:text-white px-10 rounded-md filter-btn">Closed</button>
            </div>
        </section>

        <section id="all" class="w-10/12 mx-auto  active section ">

          <div class=" p-10 border-2 border-gray-100 rounded-t-md inset-shadow-2xs mt-16 justify-between flex">
                <div class="flex items-center">
                    <div class="bg-[#4A00FF10] p-2 mr-2 rounded-full">
                      <img class="w-9 h-9" src="./assets/Aperture.png" alt="">
                    </div>
                   <div>
                    <h2 id="all-container-total-card"  class="font-semibold text-xl">50 Issues</h2>
                    <p class="text-[#64748B]">Track and manage your project issues</p>
                   </div>
                </div>

                <div class="flex items-center space-x-5">
                  <div class="flex items-center">
                    <img class="w-3 h-3" src="./assets/Ellipse 2.0.png" alt="">
                    <p class="font-medium ml-1">Open</p>
                  </div>
                    
                  <div class="flex items-center">
                     <img class="w-3 h-3" src="./assets/Ellipse 2.png" alt="">
                     <p class="font-medium ml-1">Closed</p>
                  </div>
                </div>
            </div>

            <div class="px-12 border-2  border-gray-50 shadow-md mb-14">

              <div id="all-container"  class="pt-7 grid grid-cols-4 gap-4 mb-10">


    
              </div>

            </div>
        </section>

        <section id="open" class="section w-10/12 mx-auto">

            <div class=" p-10 border-2 border-gray-100 rounded-t-md inset-shadow-2xs mt-16 justify-between flex">
                <div class="flex items-center">
                    <div class="bg-[#4A00FF10] p-2 mr-2 rounded-full">
                      <img class="w-9 h-9" src="./assets/Aperture.png" alt="">
                    </div>
                   <div>
                    <h2 id="open-container-total-card"  class="font-semibold text-xl">50 Issues</h2>
                    <p class="text-[#64748B]">Track and manage your project issues</p>
                   </div>
                </div>

                <div class="flex items-center space-x-5">
                  <div class="flex items-center">
                    <img class="w-3 h-3" src="./assets/Ellipse 2.0.png" alt="">
                    <p class="font-medium ml-1">Open</p>
                  </div>
                    
                  <div class="flex items-center">
                     <img class="w-3 h-3" src="./assets/Ellipse 2.png" alt="">
                     <p class="font-medium ml-1">Closed</p>
                  </div>
                </div>
            </div>

            <div class="px-12 border-2  border-gray-50 shadow-md mb-14">

              <div id="open-container" class="pt-7 grid grid-cols-4 gap-4 mb-10">

          
    
              </div>

            </div>
        </section>

        <section id="close" class="section w-10/12 mx-auto">

            <div class=" p-10 border-2 border-gray-100 rounded-t-md inset-shadow-2xs mt-16 justify-between flex">
                <div class="flex items-center">
                    <div class="bg-[#4A00FF10] p-2 mr-2 rounded-full">
                      <img class="w-9 h-9" src="./assets/Aperture.png" alt="">
                    </div>
                   <div>
                    <h2 id="close-container-total-card"  class="font-semibold text-xl">50 Issues</h2>
                    <p class="text-[#64748B]">Track and manage your project issues</p>
                   </div>
                </div>

                <div class="flex items-center space-x-5">
                  <div class="flex items-center">
                    <img class="w-3 h-3" src="./assets/Ellipse 2.0.png" alt="">
                    <p class="font-medium ml-1">Open</p>
                  </div>
                    
                  <div class="flex items-center">
                     <img class="w-3 h-3" src="./assets/Ellipse 2.png" alt="">
                     <p class="font-medium ml-1">Closed</p>
                  </div>
                </div>
            </div>

            <div class="px-12 border-2  border-gray-50 shadow-md mb-14">

              <div id="close-container"  class="pt-7 grid grid-cols-4 gap-4 mb-10">

    
              </div>

            </div>
        </section>
            <!-- Open the modal using ID.showModal() method -->
<!-- <button class="btn" onclick="my_modal_5.showModal()">open modal</button> -->
<dialog id="word_modal" class="modal modal-bottom sm:modal-middle">
  <div class="modal-box">
    <div id="detail-container" class="border border-[#1A91FF30] p-6 rounded-xl">
      
    </div>
    <div class="modal-action">
      <form method="dialog">
        <!-- if there is a button in form, it will close the modal -->
        <button class="btn bg-[#4c26ad] text-white rounded-lg hover:bg-[#4A00FF]">Close</button>
      </form>
    </div>
  </div>
</dialog>
    </main>

    <script src="./Script/script.js"></script>
</body>
</html>
