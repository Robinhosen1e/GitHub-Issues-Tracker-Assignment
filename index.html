<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
     <!-- title and logo  -->
    <title>GitHub Issues Tracker</title>
    <link rel="shortcut icon" href="./assets/logo.png" type="image/x-icon" />

    <!-- font awesome  -->
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.0/css/all.min.css"
      integrity="sha512-DxV+EoADOkOygM4IR9yXP8Sb2qwgidEmeqAEmDKIOfPRQZOWbXCzLC6vjbZyy0vPisbH2SyW27+ddLVCN+OMzQ=="
      crossorigin="anonymous"
      referrerpolicy="no-referrer"
    />

    <!-- font integration  -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&display=swap" rel="stylesheet">

    <!-- tailwind+daisyui  -->
    <link
      href="https://cdn.jsdelivr.net/npm/daisyui@5"
      rel="stylesheet"
      type="text/css"
    />

    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

    <!-- stylesheet  -->
    <link rel="stylesheet" href="style/style.css" />

    <style>
      .loginCard{
        box-shadow: 1px 1px 1px 1px gray;
                /* border: 1px solid #ddd; */

      }
    </style>
</head>
<body>
    
  <section class="w-[430px] bg-[##F8FAFC] mx-auto shadow-md  mt-28 border-2 border-gray-50 ">
    <div id="login-card">
      <div class="items-center justify-items-center mt-9">
        <div>
        <img src="./assets/github-logo.png" alt="">
      </div>
      <div class="text-center mt-5">
        <h2 class="font-semibold text-2xl">GitHub Issues Tracker</h2>
        <p class="text-[##64748B] mb-8">Sign in to manage your issues</p>
      </div>
      </div>

      <div>
          <div class=" bg-base-100  items-center justify-items-center">
               <div class="">
                   <fieldset class="">

                          <label class="label font-medium text-black text-[16px] mb-[5px]">Username</label> <br>
                          <input id="enter-username" maxlength="8" minlength="5" type="text" class="input rounded-sm bg-[#F4F5F7] border-none" placeholder="Enter Username" />
                          <br><label class="label text-[#4A00FF] text-[14px] mb-5">Default: admin</label>


                          <br><label class="label font-medium text-black text-[16px] mb-[5px]">Password</label> <br>
                          <input id="enter-password" maxlength="9" minlength="4" type="text" class="input rounded-sm bg-[#F4F5F7] border-none" placeholder="Enter Password" />
                          <br><label class="label text-[#4A00FF] text-[14px] mb-4">Default: admin123</label> <br>


          


                         <button id="btn-click" class="btn btn-primary mt-4 px-35 rounded-lg mb-6">Sign In</button>
        </fieldset>
              </div>
          </div>
      </div>


      <div class="flex w-9/12 mx-auto mb-6">
        <span class="text-gray-400">----------------------</span>
        <h1 class="text-[#1F2937] font-bold" >  OR  </h1> 
        <span class="text-gray-400">----------------------</span>
      </div>

      <div>
          <div>
            <h4 class="text-[14px] text-[#64748B] text-center mb-2">Demo Credentials:</h4>
          </div>

          <div class="bg-[#F8FAFC] w-11/12 mx-auto rounded-lg text-center py-6 mb-7">
            <h2>
              <b>Username:</b> admin <br> <b>Password:</b> admin123
            </h2>
          </div>
      </div>

    </div>
  </section>

  <script src="./Script/js.js"></script>
</body>
</html>
